<body>
  <!-- SVG Noise Filter for Global Grain -->
  <svg style="display: none;">
    <filter id="grainy">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
    </filter>
  </svg>
  <div id="app"></div>

  <!--
    Optional: enable real Sanity reads (public datasets only).

    Example:
    <script>
      window.__SANITY__ = {
        projectId: 'hlfbx6im',
        dataset: 'production',
        apiVersion: '2024-01-01',
        useCdn: true
        // token: '...' // do NOT ship tokens in a static site
      };
    </script>
  -->

  <script type="module" src="main.js"></script>
</body>
